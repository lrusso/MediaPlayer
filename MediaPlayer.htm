      .lds-spinner div:nth-child(3) {
        transform: rotate(60deg);
        animation-delay: -0.9s;
      }
      .lds-spinner div:nth-child(4) {
        transform: rotate(90deg);
        animation-delay: -0.8s;
      }
      .lds-spinner div:nth-child(5) {
        transform: rotate(120deg);
        animation-delay: -0.7s;
      }
      .lds-spinner div:nth-child(6) {
        transform: rotate(150deg);
        animation-delay: -0.6s;
      }
      .lds-spinner div:nth-child(7) {
        transform: rotate(180deg);
        animation-delay: -0.5s;
      }
      .lds-spinner div:nth-child(8) {
        transform: rotate(210deg);
        animation-delay: -0.4s;
      }
      .lds-spinner div:nth-child(9) {
        transform: rotate(240deg);
        animation-delay: -0.3s;
      }
      .lds-spinner div:nth-child(10) {
        transform: rotate(270deg);
        animation-delay: -0.2s;
      }
      .lds-spinner div:nth-child(11) {
        transform: rotate(300deg);
        animation-delay: -0.1s;
      }
      .lds-spinner div:nth-child(12) {
        transform: rotate(330deg);
        animation-delay: 0s;
      }
      @keyframes lds-spinner {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      @media screen and (min-height: 0px) and (max-height: 600px) {
        #album-cover {
          width: 150px;
          height: 150px;
          margin-bottom: 0px;
        }
        #song-title {
          font-size: 1.5em;
          margin-top: 10px;
        }
        #artist-name,
        #album-name {
          font-size: 0.9em;
        }
      }
    </style>

      const isMobileDevice = () => {
        return !!(
          navigator.userAgent.match(/Android/i) ||
          navigator.userAgent.match(/webOS/i) ||
          navigator.userAgent.match(/iPhone/i) ||
          navigator.userAgent.match(/iPad/i) ||
          navigator.userAgent.match(/iPod/i) ||
          navigator.userAgent.match(/BlackBerry/i) ||
          navigator.userAgent.match(/Windows Phone/i)
        )
      }

      const isUsingiOS = () => {
        return !!(
          navigator.userAgent.match(/iPhone/i) ||
          navigator.userAgent.match(/iPad/i) ||
          navigator.userAgent.match(/iPod/i)
        )
      }

      const getFilenameWithoutExtension = (filename) => {
        const lastDotIndex = filename.lastIndexOf(".")
        return lastDotIndex === -1 ? filename : filename.substring(0, lastDotIndex)
      }

      const loadMedia = (index) => {
        if (index < 0 || index >= mediaFiles.length) {
          return
        }

        currentMediaIndex = index
        const mediaFile = mediaFiles[currentMediaIndex]
        const mediaURL = URL.createObjectURL(mediaFile)
        const fileExtension = mediaFile.name.split(".").pop().toLowerCase()

        fullscreenBtn.style.display = "flex"

        if (fileExtension === "mp3") {
          mediaPlayer.style.display = "none"
          audioInfoContainer.style.display = "flex"
          subtitlesDisplay.innerHTML = ""

          ID3.loadTags(
            mediaFile.name,
            () => {
              const tags = ID3.getAllTags(mediaFile.name)
              songTitle.textContent = tags.title || "Unknown Title"
              artistName.textContent = tags.artist || "Unknown Artist"
              albumName.textContent = tags.album || "Unknown Album"

              let image = null

              try {
                if (tags.APIC) {
                  if (Array.isArray(tags.APIC)) {
                    if (tags.APIC.length > 0) {
                      image = tags.APIC[0].data
                    }
                  } else {
                    image = tags.APIC.data
                  }
                }
              } catch (err) {
                //
              }

              if (image) {
                try {
                  let base64String = ""
                  for (var i = 0; i < image.data.length; i++) {
                    base64String += String.fromCharCode(image.data[i])
                  }
                  const imageUrl = `data:${image.format};base64,${window.btoa(base64String)}`
                  albumCover.src = imageUrl
                  albumCover.style.display = "block"
                } catch (err) {
                  albumCover.style.display = "none"
                }
              } else {
                albumCover.style.display = "none"
              }
            },
            {
              tags: ["title", "artist", "album", "picture"],
              dataReader: FileAPIReader(mediaFile),
            }
          )
        } else {
          mediaPlayer.style.display = "block"
          audioInfoContainer.style.display = "none"
          subtitlesDisplay.style.display = "block"
        }

        document.title = getFilenameWithoutExtension(mediaFile.name)

        const mediaFilename = getFilenameWithoutExtension(mediaFile.name)
        const srtFile = srtFiles.find((f) => {
          const srtFilename = getFilenameWithoutExtension(f.name)
          return srtFilename === mediaFilename
        })

        if (srtFile && fileExtension === "mp4") {
          loadSubtitles(srtFile)
        } else {
          subtitles = []
          subtitlesDisplay.innerHTML = ""
          const existingTracks = mediaPlayer.querySelectorAll("track")
          existingTracks.forEach((track) => track.remove())
        }

        mediaPlayer.src = mediaURL
        mediaPlayer.load()
      }

      const playPrevMedia = () => {
        const prevIndex =
          (currentMediaIndex - 1 + mediaFiles.length) % mediaFiles.length
        loadMedia(prevIndex)
        prevMediaBtn.blur()
        progressBar.value = 0
      }

      const playNextMedia = () => {
        const nextIndex = (currentMediaIndex + 1) % mediaFiles.length
        loadMedia(nextIndex)
        nextMediaBtn.blur()
        progressBar.value = 0
      }

      const toggleRepeat = () => {
        isRepeating = !isRepeating
        if (isRepeating) {
          repeatMediaBtn.style.opacity = 1
        } else {
          repeatMediaBtn.style.opacity = 0.5
        }
        repeatMediaBtn.blur()
      }

      const loadSubtitles = (srtFile) => {
        const reader = new FileReader()
        reader.onload = (event) => {
          const buffer = event.target.result
          const view = new Uint8Array(buffer)
          const detectedEncoding = detectEncoding(view)

          const decoder = new TextDecoder(detectedEncoding)
          const srtContent = decoder.decode(buffer)

          const existingTracks = mediaPlayer.querySelectorAll("track")
          existingTracks.forEach((track) => track.remove())

          if (isUsingiOS()) {
            const vttContent = srtToVtt(srtContent)

            const vttBlob = new Blob([vttContent], { type: "text/vtt" })
            const subtitleObjectURL = URL.createObjectURL(vttBlob)

            const track = document.createElement("track")
            track.kind = "subtitles"
            track.label = "English"
            track.srclang = "en"
            track.mode = "showing"
            track.default = true
            track.src = subtitleObjectURL
            mediaPlayer.appendChild(track)
          } else {
            subtitles = parseSRT(srtContent)
          }
        }

        reader.readAsArrayBuffer(srtFile)
      }

      const parseSRT = (srtContent) => {
        try {
          const blocks = srtContent.trim().split(/\r?\n\r?\n/)

          const subs = blocks.map((block) => {
            const lines = block.split(/\r?\n/)
            const id = parseInt(lines[0], 10)
            const [startTimeString, endTimeString] = lines[1].split(" --> ")
            const text = lines.slice(2).join("<br>")
            const startTime = srtTimeToSeconds(startTimeString)
            const endTime = srtTimeToSeconds(endTimeString)

            return { id, startTime, endTime, text }
          })
          return subs
        } catch (err) {
          return []
        }

          vttContent = vttContent + timeLine + "\n"
          vttContent = vttContent + textLines.join("\n") + "\n\n"

          // when showing a two lines subtitle. If you remove the extra breakline
          // in that case, it won't be a valid VTT subtitle.
          // Only happens on iOS. Thank you iOS.

          parseInt(minutes) * 60 +
          parseInt(secs) +
          parseInt(millis) / 1000

              (view[i + 2] & 0xc0) !== 0x80
            ) {
              return "ISO-8859-1"
            }
            i = i + 2
          } else if ((view[i] & 0xf8) === 0xf0) {
            if (
              i + 3 >= view.length ||
              (view[i + 1] & 0xc0) !== 0x80 ||
              (view[i + 2] & 0xc0) !== 0x80 ||
              (view[i + 3] & 0xc0) !== 0x80
            ) {
              return "ISO-8859-1"
            }
            i = i + 3
          } else {
            return "ISO-8859-1"
          }
        }

        return "UTF-8"
      }

      const formatTime = (time) => {
        const hours = Math.floor(time / 3600)
        const minutes = Math.floor((time % 3600) / 60)
        const seconds = Math.floor(time % 60)
        if (hours > 0) {
          return `${hours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`
        }
        return `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`
      }

      const showControls = () => {
        controlsBackground.style.display = "block"
        controlsContainer.classList.add("visible")
        subtitlesDisplay.style.bottom = "75px"
        document.body.style.cursor = "auto"

        clearTimeout(inactivityTimer)
        inactivityTimer = setTimeout(() => {
          controlsBackground.style.display = "none"
          controlsContainer.classList.remove("visible")
          subtitlesDisplay.style.bottom = "15px"
          document.body.style.cursor = "none"
          volumeSliderContainer.classList.remove("visible")
        }, 5000)
      }

      const togglePlayPause = () => {
        showControls()

        if (mediaPlayer.paused) {
          mediaPlayer.play()
        } else {
          mediaPlayer.pause()
        }

        playPauseBtn.blur()
      }

      const updatePlayIcon = () => {
        playPauseBtn.innerHTML = mediaPlayer.paused ? playIcon : pauseIcon
      }

      const updateProgress = () => {
        if (!isDragging && mediaPlayer.duration) {
          progressBar.value = mediaPlayer.currentTime
          timeDisplay.textContent = `${formatTime(mediaPlayer.currentTime)} / ${formatTime(mediaPlayer.duration)}`
        }
      }

      const setProgressMax = () => {
        progressBar.max = mediaPlayer.duration
        updateVolumeUI()
      }

      const scrub = (event) => {
        const scrubTime =
          (event.offsetX / progressBar.offsetWidth) * mediaPlayer.duration
        mediaPlayer.currentTime = scrubTime
      }

      const toggleFullscreen = () => {
        showControls()

        if (!document.fullscreenElement) {
          mediaContainer.requestFullscreen().catch((err) => {})
          fullscreenBtn.innerHTML = exitFullscreenIcon
        } else {
          fullscreenBtn.innerHTML = fullscreenIcon
          document.exitFullscreen()
        }

        fullscreenBtn.blur()
      }

      const updateVolume = (newVolume) => {
        const clampedVolume = Math.max(0, Math.min(1, newVolume))
        mediaPlayer.volume = clampedVolume
        if (clampedVolume > 0) {
          mediaPlayer.muted = false
        }
      }

      const updateVolumeUI = () => {
        const volume = mediaPlayer.volume
        const isMuted = mediaPlayer.muted

        volumeSliderLevel.style.height = isMuted ? "0%" : `${volume * 100}%`

        if (isMuted || volume === 0) {
          volumeBtn.innerHTML = volumeMutedIcon
        } else if (volume < 0.33) {
          volumeBtn.innerHTML = volumeLowIcon
        } else if (volume < 0.66) {
          volumeBtn.innerHTML = volumeMediumIcon
        } else {
          volumeBtn.innerHTML = volumeHighIcon
        }
      }

      const toggleMute = () => {
        mediaPlayer.muted = !mediaPlayer.muted
        volumeBtn.blur()
      }

      const handleVolumeDrag = (event) => {
        const rect = volumeSliderTrack.getBoundingClientRect()
        const y = event.clientY - rect.top
        const percentage = Math.max(0, Math.min(1, 1 - y / rect.height))
        updateVolume(percentage)
      }

      const updateProgressOnDrag = (e) => {
        const rect = progressBar.getBoundingClientRect()
        const x = e.clientX - rect.left
        const percentage = Math.max(0, Math.min(1, x / rect.width))
        const scrubTime = percentage * mediaPlayer.duration
        mediaPlayer.currentTime = scrubTime
        progressBar.value = scrubTime
        timeDisplay.textContent = `${formatTime(scrubTime)} / ${formatTime(mediaPlayer.duration)}`
      }

      window.addEventListener("load", () => {
        if (window.top === window.self) {
          pleaseWait.style.display = "none"
          fileLoaderContainer.style.display = "block"

          mediaFileInput.value = null
          mediaFileInput.addEventListener("change", (event) => {
            pleaseWait.style.display = "block"
            fileLoaderContainer.style.display = "none"

            const files = Array.from(event.target.files)

            const sortFiles = (a, b) => {
              const nameA = a.name.toLowerCase()
              const nameB = b.name.toLowerCase()
              const isNumericA = /^\d/.test(nameA)
              const isNumericB = /^\d/.test(nameB)

              if (isNumericA && !isNumericB) {
                return -1
              }
              if (!isNumericA && isNumericB) {
                return 1
              }
              return nameA.localeCompare(nameB, undefined, {
                numeric: true,
                sensitivity: "base",
              })
            }

            mediaFiles = files
              .filter((file) => {
                const extension = file.name.split(".").pop().toLowerCase()
                return extension === "mp4" || (extension === "mp3" && !isUsingiOS())
              })
              .sort(sortFiles)

            srtFiles = files
              .filter((file) => file.name.toLowerCase().endsWith(".srt"))
              .sort(sortFiles)

            if (mediaFiles.length === 1) {
              repeatMediaBtn.style.display = "none"
              prevMediaBtn.style.display = "none"
              nextMediaBtn.style.display = "none"
            } else {
              repeatMediaBtn.style.display = "flex"
              prevMediaBtn.style.display = "flex"
              nextMediaBtn.style.display = "flex"
            }

            if (mediaFiles.length > 0) {
              loadMedia(0)
            } else {
              mediaFileInput.value = null
              window.location.reload()
            }
          })

          fileSelector.addEventListener("click", () => {
            mediaFileInput.click()
          })

          mediaPlayer.addEventListener("timeupdate", () => {
            const currentTime = mediaPlayer.currentTime
            const currentSubtitle = subtitles.find(
              (sub) => currentTime >= sub.startTime && currentTime <= sub.endTime
            )

            if (currentSubtitle) {
              subtitlesDisplay.innerHTML = currentSubtitle.text
            } else {
              subtitlesDisplay.innerHTML = ""
            }
          })

          mediaContainer.addEventListener("mousemove", (e) => {
            if (!document.hasFocus()) {
              return
            }

            showControls()

            if (isDraggingVolume) {
              handleVolumeDrag(e)
            }
          })

          mediaPlayer.addEventListener("ended", () => {
            if (isRepeating) {
              mediaPlayer.currentTime = 0
              mediaPlayer.play()
            } else {
              playNextMedia()
            }
          })

          mediaPlayer.addEventListener("loadeddata", () => {
            pleaseWait.style.display = "none"
            mediaContainer.style.display = "block"
            mediaPlayer.play()
          })

          mediaPlayer.addEventListener("error", () => {
            mediaFileInput.value = null
            window.location.reload()
          })

          if (isUsingiOS()) {
            mediaPlayer.setAttribute("playsinline", false)
            mediaPlayer.setAttribute("controls", true)
            subtitlesDisplay.style.display = "none"
            controlsBackground.style.display = "none"
            controlsContainer.style.display = "none"
            return
          } else {
            // thank you iOS
            mediaFileInput.accept = ".mp4,.mp3,.srt"
          }

          mediaPlayer.addEventListener("play", showControls)
          mediaPlayer.addEventListener("click", togglePlayPause)
          mediaPlayer.addEventListener("play", updatePlayIcon)
          mediaPlayer.addEventListener("pause", updatePlayIcon)
          mediaPlayer.addEventListener("loadedmetadata", setProgressMax)
          mediaPlayer.addEventListener("timeupdate", updateProgress)
          mediaPlayer.addEventListener("volumechange", updateVolumeUI)
          subtitlesDisplay.addEventListener("click", togglePlayPause)
          playPauseBtn.addEventListener("click", togglePlayPause)
          fullscreenBtn.addEventListener("click", toggleFullscreen)
          fullscreenBtn.innerHTML = fullscreenIcon
          volumeBtn.addEventListener("click", toggleMute)
          repeatMediaBtn.addEventListener("click", toggleRepeat)
          prevMediaBtn.addEventListener("click", playPrevMedia)
          nextMediaBtn.addEventListener("click", playNextMedia)
          audioInfoContainer.addEventListener("click", togglePlayPause)

          if (!isMobileDevice()) {
            volumeControls.addEventListener("mouseenter", () =>
              volumeSliderContainer.classList.add("visible")
            )
            volumeControls.addEventListener("mouseleave", () => {
              if (!isDraggingVolume) {
                volumeSliderContainer.classList.remove("visible")
              }
            })
            volumeSliderTrack.addEventListener("mousedown", (e) => {
              isDraggingVolume = true
              handleVolumeDrag(e)
            })
          }

          if (isMobileDevice()) {
            progressBar.addEventListener("click", scrub)
          } else {
            progressBar.addEventListener("mousedown", (e) => {
              isDragging = true
              mediaPlayer.pause()
              updateProgressOnDrag(e)
            })

            document.addEventListener("mousemove", (e) => {
              if (isDragging) {
                updateProgressOnDrag(e)
              }
            })
          }

          document.addEventListener("mouseup", () => {
            if (isDragging) {
              isDragging = false
              mediaPlayer.play()
            }

            if (isDraggingVolume) {
              isDraggingVolume = false

              if (!volumeControls.matches(":hover")) {
                volumeSliderContainer.classList.remove("visible")
              }
            }
          })

          document.addEventListener("keyup", (event) => {
            if (!mediaPlayer.src) {
              return
            }

            if (event.code === "KeyF") {
              fullscreenBtn.click()
            } else if (event.code === "Space") {
              playPauseBtn.click()
            }
          })

          document.addEventListener("keydown", (event) => {
            if (!mediaPlayer.src) {
              return
            }

            if (throttleTimeout) {
              return
            }

            if (event.code === "ArrowLeft") {
              showControls()
              mediaPlayer.currentTime = mediaPlayer.currentTime - 10
              throttleTimeout = setTimeout(() => {
                throttleTimeout = null
              }, throttleDelay)
            } else if (event.code === "ArrowRight") {
              showControls()
              mediaPlayer.currentTime = mediaPlayer.currentTime + 10
              throttleTimeout = setTimeout(() => {
                throttleTimeout = null
              }, throttleDelay)
            }
          })
        }
      })
    </script>
  </body>
</html>
